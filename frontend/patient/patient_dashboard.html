<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Patient Dashboard</title>
    <!-- Simple CSS files -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue3-sfc-loader/dist/vue3-sfc-loader.js"></script>
    <link rel="stylesheet" href="../style.css">
</head>

<body class="bg-light theme-patient">
    <div id="app">
        <!-- Component mounts here -->
    </div>

    <script>
        const options = {
            moduleCache: { vue: Vue },
            async getFile(url) {
                const res = await fetch(url);
                if (!res.ok) throw Object.assign(new Error(res.statusText + ' ' + url), { res });
                return { getContentData: asBinary => asBinary ? res.arrayBuffer() : res.text() }
            },
            addStyle(textContent) {
                const style = Object.assign(document.createElement('style'), { textContent });
                const ref = document.head.getElementsByTagName('style')[0] || null;
                document.head.insertBefore(style, ref);
            },
        }
        const { loadModule } = window['vue3-sfc-loader'];
        const app = Vue.createApp({
            components: { 'patient-app': Vue.defineAsyncComponent(() => loadModule('patient.vue', options)) },
            template: '<patient-app></patient-app>'
        });
        app.mount('#app');
    </script>
</body>

</html>
